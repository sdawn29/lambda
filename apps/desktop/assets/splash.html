<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lamda</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #121212;
      font-family: "Google Sans Flex", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-app-region: drag;
      background-image:
        radial-gradient(1100px 520px at 88% -10%, color-mix(in srgb, #3a6090 6%, transparent), transparent 65%),
        radial-gradient(800px 440px at -8% 108%, color-mix(in srgb, #3a6090 4%, transparent), transparent 65%);
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      animation: fadeIn 0.3s ease-out both;
    }

    .icon {
      width: 72px;
      height: 72px;
      background: #161616;
      border-radius: 16px;
      border: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    .lambda {
      font-size: 44px;
      font-weight: 900;
      color: #d4a017;
      line-height: 1;
      user-select: none;
      letter-spacing: -0.02em;
    }

    .name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #9e9e9e;
    }

    .dots {
      display: flex;
      gap: 5px;
      margin-top: 4px;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #3a6090;
      opacity: 0.35;
      animation: bounce 1s ease-in-out infinite;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0);    opacity: 0.25; }
      40%            { transform: translateY(-4px); opacity: 0.75; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <span class="lambda">Λ</span>
    </div>
    <p class="name">lamda</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
